name: Steam Tunnel Server Daemon

on:
  workflow_dispatch:

jobs:
  run-server:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    # Combined and cleaned up apt installations to reduce runner layers
    - name: Install Native Runtime Dependencies
      run: |
        sudo dpkg --add-architecture i386
        sudo apt-get update
        sudo apt-get install -y p7zip-full lib32gcc-s1 lib32stdc++6 libc6:i386 curl wget unzip ca-certificates

    - name: Automate Latest Xray-Core Download & Install
      run: |
        case "$(dpkg --print-architecture)" in
            amd64) XR="Xray-linux-64.zip" ;;
            arm64) XR="Xray-linux-arm64-v8a.zip" ;;
            *) XR="Xray-linux-64.zip" ;;
        esac
        
        echo "[*] Fetching official target release zip: ${XR}..."
        wget -qO /tmp/xray.zip "https://github.com/XTLS/Xray-core/releases/latest/download/${XR}"
        
        echo "[*] Extracting and deploying binaries..."
        sudo unzip -q /tmp/xray.zip -d /tmp/xray-dir
        sudo mv /tmp/xray-dir/xray /usr/local/bin/xray
        sudo chmod +x /usr/local/bin/xray
        
        sudo rm -rf /tmp/xray.zip /tmp/xray-dir
        echo "[+] Xray core engine successfully provisioned globally."

    - name: Authenticate Headless Steam User Account
      env:
        USER: ${{ secrets.STEAM_USERNAME }}
        PASS: ${{ secrets.STEAM_PASSWORD }}
      run: |
        mkdir -p /tmp/steamcmd
        wget -qO- "https://steamcdn-a.akamaihd.net/client/installer/steamcmd_linux.tar.gz" | tar -C /tmp/steamcmd -zxvf -
        
        echo "[*] Initializing user login with Valve master servers..."
        # NOTE: Removed +quit immediately to ensure credentials cache fully, 
        # then explicitly mapped paths.
        /tmp/steamcmd/steamcmd.sh +login $USER $PASS +quit
        
        mkdir -p /home/runner/.steam/sdk64
        cp /tmp/steamcmd/linux64/steamclient.so /home/runner/.steam/sdk64/steamclient.so
        rm -rf /tmp/steamcmd
        echo "[+] Valve dependency subsystem mapping verified."

    - name: Extract Server Package
      run: |
        mkdir server_run
        7z x server_build.7z -oserver_run/
        cd server_run
        chmod +x VpsServer

    - name: Start Background Xray Core Engine
      run: |
        sudo xray -config config.json > xray.log 2>&1 &
        echo "[+] Live Xray core instance executing in background context."

    - name: Execute Steam Server & Display Routing ID
      run: |
        cd server_run
        
        # FIX 1: Explicitly tell SteamAPI which Application/Server context it belongs to.
        # Replace '480' with your specific game's AppID or Dedicated Server AppID if 480 doesn't apply.
        echo "480" > steam_appid.txt
        
        # FIX 2: Explicitly include standard Steam search paths in your runtime environment.
        export LD_LIBRARY_PATH=.:/home/runner/.steam/sdk64:$LD_LIBRARY_PATH
        
        ./VpsServer > server.log 2>&1 &
        
        echo "[*] Waiting for Steam user authentication loops..."
        STEAM_ID=""
        
        # Increased check time slightly as Steam handshakes can take a moment on cold containers
        for i in {1..45}; do
          if grep -q "YOUR TARGET SERVER STEAMID:" server.log; then
            STEAM_ID=$(grep "YOUR TARGET SERVER STEAMID:" server.log | awk '{print $NF}')
            break
          fi
          sleep 2
        done

        if [ -z "$STEAM_ID" ]; then
          echo "[-] ERROR: Failed to acquire SteamID."
          echo "=== SERVER LOG ==="
          cat server.log
          exit 1
        fi

        echo "### 🚀 STEAM SECURE TUNNEL ONLINE" >> $GITHUB_STEP_SUMMARY
        echo "Your runner is securely linked to the Steam Datagram Relay." >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "#### 🔑 COPY THIS ID FOR YOUR WINDOWS CLIENT:" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`text" >> $GITHUB_STEP_SUMMARY
        echo "$STEAM_ID" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

        tail -f server.log
