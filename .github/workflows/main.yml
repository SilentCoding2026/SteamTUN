name: Steam Tunnel Server Daemon

on:
  workflow_dispatch: # Allows you to manually click "Run workflow" from the GitHub UI

jobs:
  run-server:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Install Native Runtime Dependencies
      run: |
        sudo apt-get update
        sudo dpkg --add-architecture i386
        sudo apt-get update
        # Installs 32-bit execution layers for Steam, plus core extraction and download utilities
        sudo apt-get install -y p7zip-full lib32gcc-s1 lib32stdc++6 libc6:i386 curl wget unzip ca-certificates

    - name: Automate Latest Xray-Core Download & Install
      run: |
        echo "[*] Parsing runner system architecture..."
        case "$(dpkg --print-architecture)" in
            amd64) XR="Xray-linux-64.zip" ;;
            arm64) XR="Xray-linux-arm64-v8a.zip" ;;
            *) XR="Xray-linux-64.zip" ;;
        esac
        
        echo "[*] Fetching official target release zip: ${XR}..."
        wget -qO /tmp/xray.zip "https://github.com/XTLS/Xray-core/releases/latest/download/${XR}"
        
        echo "[*] Extracting and deploying binaries..."
        sudo unzip -q /tmp/xray.zip -d /tmp/xray-dir
        sudo mv /tmp/xray-dir/xray /usr/local/bin/xray
        sudo chmod +x /usr/local/bin/xray
        
        # Clean up temporary installation workspace paths
        sudo rm -rf /tmp/xray.zip /tmp/xray-dir
        echo "[+] Xray core engine successfully provisioned globally."

    - name: Extract Server Package
      run: |
        mkdir server_run
        7z x server_build.7z -oserver_run/
        cd server_run
        chmod +x VpsServer

    - name: Start Background Xray Core Engine
      run: |
        # Launch the newly installed Xray bin using the config.json located in the repo root
        sudo xray -config config.json > xray.log 2>&1 &
        echo "[+] Live Xray core instance executing in background context."

    - name: Execute Steam Server & Display Routing ID
      run: |
        cd server_run
        
        echo "[*] Launching Automated Steam Server inside GitHub Actions Runner..."
        
        # Start the C# server engine in the background and pipe output to server.log
        export LD_LIBRARY_PATH=.
        ./VpsServer > server.log 2>&1 &
        
        echo "[*] Waiting for Steam anonymous authentication loops..."
        
        # Monitor log file until unique SteamID is generated by Valve
        STEAM_ID=""
        for i in {1..30}; do
          if grep -q "YOUR TARGET SERVER STEAMID:" server.log; then
            STEAM_ID=$(grep "YOUR TARGET SERVER STEAMID:" server.log | awk '{print $NF}')
            break
          fi
          sleep 2
        done

        # Handle errors if Steam fails to connect
        if [ -z "$STEAM_ID" ]; then
          echo "[-] CRITICAL ERROR: Steam failed to register an ID within 60 seconds."
          echo "=== DEBUG LOG OUTPUT ==="
          cat server.log
          exit 1
        fi

        # Write the SteamID onto your main GitHub Actions Dashboard interface
        echo "### 🚀 STEAM SECURE TUNNEL ONLINE" >> $GITHUB_STEP_SUMMARY
        echo "Your runner is securely linked to the Steam Datagram Relay." >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "#### 🔑 COPY THIS ID FOR YOUR WINDOWS CLIENT:" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`text" >> $GITHUB_STEP_SUMMARY
        echo "$STEAM_ID" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        echo "This workflow will now keep the server alive processing your proxy traffic." >> $GITHUB_STEP_SUMMARY

        echo "[+] SUCCESS! Server SteamID discovered: $STEAM_ID"
        echo "[*] Entering persistent data loop. Keeping runner open..."

        # Keep step open so background tasks continue processing network traffic
        tail -f server.log
