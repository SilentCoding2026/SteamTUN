name: Steam Tunnel Server Daemon New

on:
  workflow_dispatch:

jobs:
  run-server:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Install Native Runtime Dependencies
      run: |
        sudo dpkg --add-architecture i386
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          p7zip-full lib32gcc-s1 lib32stdc++6 libc6:i386 curl wget unzip ca-certificates

    - name: Automate Latest Xray-Core Download & Install
      run: |
        case "$(dpkg --print-architecture)" in
            amd64) XR="Xray-linux-64.zip" ;;
            arm64) XR="Xray-linux-arm64-v8a.zip" ;;
            *) XR="Xray-linux-64.zip" ;;
        esac
        
        wget -qO /tmp/xray.zip "https://github.com/XTLS/Xray-core/releases/latest/download/${XR}"
        sudo unzip -q /tmp/xray.zip -d /tmp/xray-dir
        sudo mv /tmp/xray-dir/xray /usr/local/bin/xray
        sudo chmod +x /usr/local/bin/xray
        sudo rm -rf /tmp/xray.zip /tmp/xray-dir
        echo "[+] Xray core engine successfully provisioned globally."

    - name: Authenticate & Maintain Background Steam Instance
      env:
        USER: ${{ secrets.STEAM_USERNAME }}
        PASS: ${{ secrets.STEAM_PASSWORD }}
      run: |
        mkdir -p /home/runner/steamcmd
        wget -qO- "https://steamcdn-a.akamaihd.net/client/installer/steamcmd_linux.tar.gz" | tar -C /home/runner/steamcmd -zxvf -
        
        echo "[*] Running initial SteamCMD bootstrap update..."
        # We run it once with +quit to force it to download the latest linux64/linux32 binaries and engines
        /home/runner/steamcmd/steamcmd.sh +quit || true
  
        echo "[*] Setting up SDK directory links..."
        mkdir -p /home/runner/.steam/sdk34
        mkdir -p /home/runner/.steam/sdk64
        
        # FIX: Locate where steamcmd actually placed steamclient.so after bootstrap
        # Usually it's in ~/.steam/sdk34/ / ~/.steam/sdk64/ or inside the runner's Steam folder
        cp /home/runner/Steam/linux32/steamclient.so /home/runner/.steam/sdk34/steamclient.so || cp /home/runner/steamcmd/linux32/steamclient.so /home/runner/.steam/sdk34/steamclient.so || true
        cp /home/runner/Steam/linux64/steamclient.so /home/runner/.steam/sdk64/steamclient.so || cp /home/runner/steamcmd/linux64/steamclient.so /home/runner/.steam/sdk64/steamclient.so || true
  
        echo "[*] Launching Steam client daemon into background context..."
        # Now launch the actual persistent connection background worker
        nohup /home/runner/steamcmd/steamcmd.sh +login $USER $PASS > /home/runner/steamcmd.log 2>&1 &
        
        echo "[*] Waiting 15 seconds for Valve master server handshake..."
        sleep 15
        cat /home/runner/steamcmd.log
    - name: Extract Server Package
      run: |
        mkdir server_run
        7z x server_build.7z -oserver_run/
        cd server_run
        chmod +x VpsServer

    - name: Start Background Xray Core Engine
      run: |
        sudo xray -config config.json > xray.log 2>&1 &
        echo "[+] Live Xray core instance executing in background context."

    - name: Execute Steam Server & Display Routing ID
      run: |
        cd server_run
        
        echo "480" > steam_appid.txt
        
        export LD_LIBRARY_PATH=.:/home/runner/.steam/sdk64:/home/runner/.steam/sdk34:$LD_LIBRARY_PATH
        export SteamAppId=480
        export STEAM_CONFIG_PATH=/home/runner/Steam
        export HOME=/home/runner
        
        ./VpsServer > server.log 2>&1 &
        
        echo "[*] Waiting for Steam user authentication loops..."
        STEAM_ID=""
        for i in {1..45}; do
          # Print progress to prevent GitHub Actions from thinking the runner is completely dead
          echo "[*] Checking server logs (Attempt $i/45)..."
          
          if grep -q "YOUR TARGET SERVER STEAMID:" server.log; then
            STEAM_ID=$(grep "YOUR TARGET SERVER STEAMID:" server.log | awk '{print $NF}')
            break
          elif grep -q "CRITICAL ERROR" server.log || grep -q "failed" server.log; then
            echo "[-] Detected immediate crash signature in server.log:"
            cat server.log
            exit 1
          fi
          sleep 5
        done

        if [ -z "$STEAM_ID" ]; then
          echo "[-] ERROR: Failed to acquire SteamID within the time limit."
          echo "=== SERVER LOG ==="
          cat server.log
          echo "=== BACKGROUND STEAMCMD LOG ==="
          cat /home/runner/steamcmd.log
          exit 1
        fi

        echo "### 🚀 STEAM SECURE TUNNEL ONLINE" >> $GITHUB_STEP_SUMMARY
        echo "Your runner is securely linked to the Steam Datagram Relay." >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "#### 🔑 COPY THIS ID FOR YOUR WINDOWS CLIENT:" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`text" >> $GITHUB_STEP_SUMMARY
        echo "$STEAM_ID" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

        tail -f server.log
